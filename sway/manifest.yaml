sway_setup_manifest:
  distro: Debian 13
  packages_installed:
    - sway
    - swaybg
    - swayidle
    - swaylock
    - waybar
    - wofi
    - wl-clipboard
    - xwayland
    - foot
    - grim
    - slurp
    - pavucontrol
    - libinput-tools
    - wev

  files:
    "sway/config.2025-09-09":
      is_active: true
      highlights:
        - set $mod Mod4
        - set $term foot
        - set $menu wofi --show drun
        - 'output * scale 1.5'
        - |
          input * {
              xkb_layout "pl"
          }
        - |
          input "SYNA308D:00 06CB:82F5 Touchpad" {
              tap enabled
              natural_scroll enabled
              dwt enabled
              click_method clickfinger
          }
        - |
          client.focused          #d58ab3 #241B2A #d58ab3 #d58ab3 #d58ab3
          client.focused_inactive #241B2A #241B2A #88d8b0 #88d8b0 #241B2A
          client.unfocused        #241B2A #241B2A #88d8b0 #88d8b0 #241B2A
          client.urgent           #241B2A #241B2A #ff5555 #ff5555 #241B2A
        - 'exec waybar'

    "waybar/config.jsonc":
      path: waybar/config.jsonc
    "waybar/style.css":
      path: waybar/style.css
    "waybar/scripts":
      paths:
        - waybar/scripts/brightness-menu.sh
        - waybar/scripts/get-dark-mode.sh
        - waybar/scripts/power-menu.sh
        - waybar/scripts/toggle-dark-mode.sh

    "wofi/config":
      path: wofi/config
      notes:
        - Używamy domyślnego XDG; brak ręcznego XDG_DATA_DIRS.

    "foot/foot.ini":
      path: foot/foot.ini

    "desktop-files":
      paths:
        - desktop-files/discord.desktop
        - desktop-files/telegram.desktop
        - desktop-files/whatsapp.desktop

  env:
    notes:
      - Nie nadpisujemy XDG_DATA_DIRS. Systemowe wartości wystarczają.

  behavior_verified:
    - $mod+d uruchamia Wofi (drun)
    - Waybar startuje z Sway (exec waybar)
    - Touchpad: tap-to-click i natural scroll działają
    - Nawigacja: $mod+strzałki, $mod+Shift+strzałki, workspaces 1–10
    - Firefox ESR działa

  known_limits:
    - Długie generacje w FF czasem zrywają strumień; odświeżenie karty pomaga